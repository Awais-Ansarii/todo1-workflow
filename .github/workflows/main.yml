name: Test and Build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        
